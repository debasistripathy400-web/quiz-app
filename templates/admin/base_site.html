{% extends "admin/base.html" %}

{% block title %}{{ title }} | QuizElite Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}"
        style="display: flex; align-items: center; gap: 10px; color: #ffffff; text-decoration: none;">
        <span
            style="background: white; color: #2563eb; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; font-size: 1.2rem; flex-shrink: 0;">Q</span>
        <span
            style="font-weight: 800; font-family: 'Outfit', sans-serif; letter-spacing: -0.5px; white-space: nowrap;">QuizElite
            <span style="font-weight: 400; opacity: 0.8; font-size: 0.9rem;">Control</span></span>
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap"
    rel="stylesheet">
<style>
    /* Premium White & Blue Admin Theme - Centering and Fit Fixes */
    :root {
        --primary: #2563eb;
        --primary-dark: #1e40af;
        --secondary: #3b82f6;
        --bg-main: #f1f5f9;
        --bg-card: #ffffff;
        --text-dark: #0f172a;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --header-bg: #2563eb;
    }

    body {
        background-color: var(--bg-main) !important;
        font-family: 'Inter', sans-serif !important;
        color: var(--text-dark) !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    /* Fixed Container Width and Responsiveness */
    #container {
        min-width: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        min-height: 100vh !important;
    }

    /* Header Styling */
    #header {
        background: var(--header-bg) !important;
        padding: 15px 5% !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    #branding {
        float: none !important;
    }

    #user-tools {
        float: none !important;
        margin: 0 !important;
        color: rgba(255, 255, 255, 0.9) !important;
        font-weight: 500 !important;
        position: static !important;
    }

    /* Breadcrumbs */
    div.breadcrumbs {
        padding: 12px 5% !important;
        background: var(--bg-card) !important;
        border-bottom: 1px solid var(--border-color) !important;
        font-size: 13px !important;
        color: var(--text-muted) !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* Content Area */
    #content {
        padding: 30px 5% !important;
        flex: 1 !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* Login Page Override - Proper Centering */
    .login {
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
    }

    .login #container {
        min-width: auto !important;
        width: 100% !important;
        max-width: 440px !important;
        justify-content: center !important;
        min-height: auto !important;
        background: white !important;
        border-radius: 20px !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15) !important;
        overflow: hidden !important;
        margin: 20px !important;
    }

    .login #header {
        padding: 40px !important;
        justify-content: center !important;
    }

    .login #content {
        padding: 40px !important;
    }

    .login .form-row {
        padding: 0 0 20px 0 !important;
        border: none !important;
    }

    .login .form-row label {
        display: block !important;
        margin-bottom: 8px !important;
        color: var(--text-dark) !important;
        font-weight: 500 !important;
    }

    .login input[type=text],
    .login input[type=password] {
        width: 100% !important;
        padding: 12px 16px !important;
        border-radius: 8px !important;
        border: 1px solid var(--border-color) !important;
        background: #f8fafc !important;
        box-sizing: border-box !important;
    }

    .login .submit-row {
        padding: 20px 0 0 0 !important;
        background: none !important;
        border: none !important;
        text-align: center !important;
    }

    .login .submit-row input {
        width: 100% !important;
        margin: 0 !important;
    }

    /* Modules and Cards */
    .module {
        border: none !important;
        background: var(--bg-card) !important;
        border-radius: 12px !important;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1) !important;
        margin-bottom: 25px !important;
    }

    .module h2 {
        background: #f8fafc !important;
        padding: 15px 20px !important;
        font-size: 0.85rem !important;
        text-transform: uppercase !important;
        letter-spacing: 0.05em !important;
    }

    /* Buttons */
    .button,
    input[type=submit] {
        background: var(--primary) !important;
        border-radius: 8px !important;
        padding: 12px 24px !important;
        transition: all 0.3s ease !important;
    }

    .button:hover,
    input[type=submit]:hover {
        background: var(--primary-dark) !important;
        transform: translateY(-1px) !important;
    }
</style>
{% endblock %}

{% block nav-global %}{% endblock %}
