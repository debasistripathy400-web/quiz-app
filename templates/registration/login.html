{% extends 'base.html' %}

{% block title %}Login | QuizElite{% endblock %}

{% block content %}
<div class="glass animate-fade-in" style="max-width: 450px; margin: 4rem auto; padding: 2.5rem;">
    <h2 style="margin-bottom: 1.5rem; text-align: center; font-size: 2rem;">Welcome Back</h2>
    {% if form.errors %}
    <p style="color: var(--danger); text-align: center;">Invalid username or password.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <style>
            input {
                width: 100%;
                padding: 0.8rem;
                margin-top: 0.5rem;
                margin-bottom: 1.2rem;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--glass-border);
                border-radius: 0.5rem;
                color: white;
            }

            label {
                font-weight: 500;
            }
        </style>
        <p>
            <label for="id_username">Username:</label>
            <input type="text" name="username" required id="id_username">
        </p>
        <p>
            <label for="id_password">Password:</label>
            <input type="password" name="password" required id="id_password">
        </p>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
        Don't have an account? <a href="{% url 'signup' %}" style="color: var(--primary);">Sign Up</a>
    </p>
</div>
{% endblock %}
