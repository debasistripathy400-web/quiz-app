{% extends 'base.html' %}

{% block title %}Sign Up | QuizElite{% endblock %}

{% block content %}
<div class="glass animate-fade-in" style="max-width: 450px; margin: 4rem auto; padding: 2.5rem;">
    <h2 style="margin-bottom: 1.5rem; text-align: center; font-size: 2rem;">Join QuizElite</h2>
    <form method="post">
        {% csrf_token %}
        <style>
            input {
                width: 100%;
                padding: 0.8rem;
                margin-top: 0.5rem;
                margin-bottom: 1.2rem;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--glass-border);
                border-radius: 0.5rem;
                color: white;
            }

            .helptext {
                font-size: 0.8rem;
                color: var(--text-muted);
                display: block;
                margin-bottom: 0.5rem;
            }

            ul {
                list-style: none;
                padding: 0;
                margin-bottom: 1rem;
                font-size: 0.8rem;
                color: var(--danger);
            }
        </style>
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--primary);">Login</a>
    </p>
</div>
{% endblock %}
